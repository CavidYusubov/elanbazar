name: elanbazar
description: "Elanbazar is a mobile application built with Flutter that serves as a platform for buying and selling various products. It provides users with a seamless experience to browse, search, and purchase items from a wide range of categories. The app features a user-friendly interface, secure payment options, and efficient communication between buyers and sellers. With Elanbazar, users can easily find great deals and connect with a vibrant community of buyers and sellers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  reorderable_grid_view: ^2.2.8
  dio: ^5.7.0
  flutter_launcher_icons: ^0.14.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#000000"
  image: assets/images/splash_logo.png
  web: true

  android_12:
    color: "#000000"
    image: assets/images/splash_logo.png